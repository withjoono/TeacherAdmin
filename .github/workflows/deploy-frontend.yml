name: Deploy TeacherAdmin Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        working-directory: frontend
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (production only - no .env.local)
        working-directory: frontend
        run: npm run build



      - name: Deploy to Firebase Hosting
        working-directory: frontend
        run: npx firebase-tools deploy --only hosting --project ts-front-479305
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
